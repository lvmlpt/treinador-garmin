name: Garmin Sync Diário

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.13'

      - name: Instalar dependências
        run: pip install garminconnect curl_cffi

      - name: Rodar sync do Garmin
        env:
          GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python garmin_sync.py

      - name: Salvar arquivos via GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import base64, json, os
          import urllib.request, urllib.error

          token = os.environ['GITHUB_TOKEN']
          repo  = 'lvmlpt/treinador-garmin'
          headers = {
              'Authorization': f'token {token}',
              'Content-Type':  'application/json',
              'User-Agent':    'garmin-sync'
          }

          for filename in ['garmin_resumo.json', 'garmin_dados_atuais.json']:
              if not os.path.exists(filename):
                  print(f'Arquivo {filename} nao encontrado.')
                  continue
              with open(filename, 'rb') as f:
                  content = base64.b64encode(f.read()).decode()
              url = f'https://api.github.com/repos/{repo}/contents/{filename}'
              sha = None
              try:
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req) as resp:
                      sha = json.loads(resp.read().decode()).get('sha')
              except urllib.error.HTTPError as e:
                  if e.code != 404:
                      print(f'Aviso: {e}')
              data = {'message': f'Sync Garmin {filename}', 'content': content}
              if sha:
                  data['sha'] = sha
              req = urllib.request.Request(url, data=json.dumps(data).encode(), method='PUT', headers=headers)
              try:
                  with urllib.request.urlopen(req) as resp:
                      print(f'OK: {filename} salvo')
              except urllib.error.HTTPError as e:
                  print(f'Erro: {filename} - {e.read().decode()}')
          EOF
